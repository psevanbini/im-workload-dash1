<style>
    :root {
        --ps-green: #85ad33; /* cite: 112 */
        --ps-dark-green: #618025; /* cite: 113 */
        --ps-blue: #7bbaf0; /* cite: 114 */
        --ps-gold: #f2b001; /* cite: 115 */
        --ps-light-green: #e5f1d4; /* cite: 117 */
        --ps-dark-gray: #444444; /* cite: 118 */
        --ps-light-gray: #f7f8f8; /* cite: 119 */
    }

    body {
        font-family: 'Montserrat', Arial, sans-serif; /* cite: 40 */
        background-color: var(--ps-light-gray);
        color: var(--ps-dark-gray);
        margin: 20px;
    }

    /* Top Bar & Dropdown cite: user prompt */
    .dashboard-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 3px solid var(--ps-green);
        padding-bottom: 15px;
        margin-bottom: 25px;
    }

    .dashboard-header h1 {
        color: var(--ps-green);
        font-size: 24pt; /* cite: 24 */
        margin: 0;
    }

    .view-selector {
        padding: 10px;
        font-family: 'Montserrat', sans-serif;
        font-weight: 600;
        border: 2px solid var(--ps-green);
        border-radius: 5px;
    }

    /* Alerts cite: user prompt */
    .alert-container {
        margin-bottom: 20px;
    }

    .burnout-warning {
        background-color: #f2dede;
        border-left: 6px solid #d9534f;
        padding: 15px;
        color: #a94442;
        font-weight: bold;
        display: none;
    }

    /* Table Design cite: 74-80 */
    .im-table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .im-table th {
        background-color: var(--ps-green);
        color: white;
        padding: 15px;
        text-align: left;
    }

    .im-table td {
        padding: 15px;
        border-bottom: 1px solid #eee;
    }

    .im-table tr:hover {
        background-color: #fcfcfc;
    }

    /* Strategy Notes cite: 51-65 */
    .strategy-note {
        background-color: var(--ps-light-green);
        border-left: 6px solid var(--ps-green);
        padding: 10px;
        font-style: italic;
        font-size: 0.9em;
    }

    .total-col {
        font-weight: bold;
        color: var(--ps-dark-green);
        text-align: center;
    }
</style>

<div class="dashboard-header">
    <h1>IM Workload Dashboard</h1>
    <select class="view-selector" id="roleSelector" onchange="toggleView()">
        <option value="ic">View: Individual Contributor</option>
        <option value="lead">View: Team Lead</option>
        <option value="manager">View: Manager</option>
    </select>
</div>

<div class="alert-container">
    <div id="burnoutAlert" class="burnout-warning">
        ⚠️ BURNOUT ALERT: Capacity > 90%. Velocity check required.
    </div>
</div>

<div class="card">
    <h2 id="tableTitle" style="color: var(--ps-dark-green);">Active Projects & Deals</h2>
    <table class="im-table">
        <thead>
            <tr id="tableHeader">
                </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    const mockData = {
        projects: [
            { name: "Template Audit", role: "Lead (2)", complexity: "Low (1)", detail: "Internal", date: "03/15/2026", total: 3, team: "West" },
            { name: "Training Alignment", role: "Contributor (0)", complexity: "Medium (3)", detail: "Cross-Team", date: "04/01/2026", total: 3, team: "West" }
        ],
        deals: [
            { name: "Lincoln District", sis: "PowerSchool (3)", health: "Blue (2)", size: "Medium (3)", date: "03/20/2026", total: 8, team: "West" },
            { name: "Westside Academy", sis: "Aeries (2)", health: "Red (2)", size: "Small (1)", date: "03/22/2026", total: 5, team: "East" }
        ]
    };

    function toggleView() {
        const role = document.getElementById('roleSelector').value;
        const header = document.getElementById('tableHeader');
        const body = document.getElementById('tableBody');
        const burnout = document.getElementById('burnoutAlert');
        
        // Reset
        header.innerHTML = '';
        body.innerHTML = '';

        // Determine Columns cite: user prompt
        let cols = ["Name", "Role (Pts)", "Complexity (Pts)", "Type/Detail", "Date (MM/DD/YYYY)"];
        if (role !== 'ic') cols.push("Strategy Notes");
        cols.push("Point Total"); // Must be last

        cols.forEach(c => {
            let th = document.createElement('th');
            th.innerText = c;
            header.appendChild(th);
        });

        // Populate Projects (using MM/DD/YYYY format)
        mockData.projects.forEach(p => {
            if (role === 'lead' && p.team !== 'West') return;
            
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${p.name}</strong></td>
                <td>${p.role}</td>
                <td>${p.complexity}</td>
                <td>${p.detail}</td>
                <td>${p.date}</td>
                ${role !== 'ic' ? '<td><div class="strategy-note">Confidential: OKR 2026 Alignment</div></td>' : ''}
                <td class="total-col">${p.total}</td>
            `;
            body.appendChild(tr);
        });

        // Logic for Burnout Warning at 90%
        const currentPoints = 19; // Simulated total
        const mpc = 20;
        burnout.style.display = (currentPoints / mpc) >= 0.9 ? 'block' : 'none';
    }

    // Initialize
    toggleView();
</script>
