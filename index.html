<style>
    :root {
        --ps-green: #85ad33; /* cite: 112 */
        --ps-dark-green: #618025; /* cite: 113 */
        --ps-blue: #7bbaf0; /* cite: 114 */
        --ps-gold: #f2b001; /* cite: 115 */
        --ps-light-green: #e5f1d4; /* cite: 117 */
        --ps-dark-gray: #444444; /* cite: 118 */
        --ps-light-gray: #f7f8f8; /* cite: 119 */
    }

    .project-dashboard {
        font-family: 'Montserrat', sans-serif; /* cite: 40 */
        max-width: 1200px;
        margin: auto;
    }

    /* Header & Branding cite: 4-13 */
    .project-header {
        border-bottom: 2px solid var(--ps-green);
        padding-bottom: 10px;
        margin-bottom: 20px;
    }

    .project-header h2 {
        color: var(--ps-green);
        font-size: 24pt; /* cite: 24 */
        font-weight: bold;
    }

    /* Burnout Warning cite: user prompt */
    .alert-banner {
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        font-weight: 600;
        display: none; /* Triggered by JS */
    }

    .burnout-90 {
        background-color: #f2dede;
        border-left: 6px solid #d9534f;
        color: #a94442;
    }

    /* Table Styling cite: 74-80 */
    .project-table {
        width: 100%;
        border-collapse: collapse;
        background: white;
    }

    .project-table th {
        background-color: var(--ps-green);
        color: white;
        padding: 12px;
        text-align: left;
    }

    .project-table td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
    }

    /* Status Indicators cite: user prompt */
    .status-overdue {
        color: var(--ps-gold);
        font-weight: bold;
        text-transform: uppercase;
    }

    /* Strategy Callout cite: 51-65 */
    .strategy-note {
        background-color: var(--ps-light-green);
        border-left: 6px solid var(--ps-green);
        padding: 10px;
        margin-top: 5px;
        font-size: 0.9em;
        font-style: italic;
    }
</style>

<div class="project-dashboard">
    <div class="project-header">
        <h2>Project Management & Workload</h2>
        <div id="burnoutAlert" class="alert-banner burnout-90">
            ⚠️ BURNOUT WARNING: Capacity exceeds 90%. Assignment rotation paused.
        </div>
    </div>

    <div class="tabs" style="margin-bottom: 20px;">
        <button onclick="updateProjectView('ic')" class="tab-btn">IC View</button>
        <button onclick="updateProjectView('lead')" class="tab-btn">Lead View</button>
        <button onclick="updateProjectView('manager')" class="tab-btn">Manager View</button>
    </div>

    <div class="card">
        <table class="project-table">
            <thead>
                <tr>
                    <th>Project Name</th>
                    <th>Role</th>
                    <th>Complexity</th>
                    <th>Points</th>
                    <th>End Date</th>
                    <th id="leadHeader" style="display:none;">Strategy Notes</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="projectBody">
                </tbody>
        </table>
    </div>

    <div id="historicalSection" style="display:none; margin-top:30px;">
        <div class="project-header">
            <h3>Historical Data: Projects vs. Deals</h3>
        </div>
        <div style="display:flex; gap:20px; height:150px; align-items:flex-end; background:#eee; padding:20px;">
            <div style="height:70%; width:50px; background:var(--ps-green); position:relative;"><span style="position:absolute; bottom:-20px; font-size:10px;">Deals</span></div>
            <div style="height:40%; width:50px; background:var(--ps-blue); position:relative;"><span style="position:absolute; bottom:-20px; font-size:10px;">Projects</span></div>
        </div>
    </div>
</div>

<script>
    const projectData = [
        { name: "Template Audit", role: "Lead", complexity: "Low", points: 3, end: "2026-03-20", status: "Overdue", team: "West" },
        { name: "Training Alignment", role: "Contributor", complexity: "Medium", points: 3, end: "2026-04-15", status: "In Progress", team: "West" },
        { name: "OKR Strategy Build", role: "Lead", complexity: "High", points: 7, end: "2026-05-01", status: "Green Light", team: "East" }
    ];

    function updateProjectView(role) {
        const body = document.getElementById('projectBody');
        const alert = document.getElementById('burnoutAlert');
        const history = document.getElementById('historicalSection');
        const leadHeader = document.getElementById('leadHeader');
        
        body.innerHTML = '';
        
        // Burnout Logic: If points > 18 (Assuming 20 is MPC) cite: user prompt
        const totalPoints = projectData.reduce((sum, p) => sum + p.points, 0);
        alert.style.display = totalPoints >= 18 ? 'block' : 'none';

        projectData.forEach(p => {
            // Role Filter cite: user prompt
            if (role === 'lead' && p.team !== 'West') return;

            const row = document.createElement('tr');
            const statusClass = p.status === 'Overdue' ? 'class="status-overdue"' : '';
            
            row.innerHTML = `
                <td><strong>${p.name}</strong></td>
                <td>${p.role}</td>
                <td>${p.complexity}</td>
                <td>${p.points}</td>
                <td>${p.end}</td>
                ${role !== 'ic' ? `<td><div class="strategy-note">Confidential: Resource for Q2 expansion.</div></td>` : ''}
                <td ${statusClass}>${p.status}</td>
            `;
            body.appendChild(row);
        });

        // Toggle elements based on role
        leadHeader.style.display = role === 'ic' ? 'none' : 'table-cell';
        history.style.display = role === 'ic' ? 'none' : 'block';
    }

    // Default to IC View
    updateProjectView('ic');
</script>
